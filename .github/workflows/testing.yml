name: Testing CI

on:
  push:
    branches: [ main, qa ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    name: 'Test'

    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
        cache: 'yarn'

    - run: yarn
    - run: yarn lint
